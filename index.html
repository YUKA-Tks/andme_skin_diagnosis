<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>＆me 肌診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #c47a8a;
    --pink-light: #fdf2f5;
    --pink-border: #f4c0d1;
    --pink-dark: #993556;
    --blue: #185fa5;
    --blue-light: #f1f5ff;
    --text: #1a1a1a;
    --text-2: #555;
    --text-3: #999;
    --bg: #fafaf8;
    --surface: #fff;
    --border: rgba(0,0,0,0.1);
    --border-soft: rgba(0,0,0,0.06);
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px 60px;
  }
  .app {
    width: 100%;
    max-width: 480px;
  }
  /* ヘッダー */
  .logo {
    text-align: center;
    padding: 32px 0 28px;
    font-family: 'Noto Serif JP', serif;
    font-size: 26px;
    font-weight: 500;
    letter-spacing: .12em;
    color: var(--text);
  }
  .logo span { color: var(--pink); }
  .logo small {
    display: block;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    letter-spacing: .2em;
    color: var(--text-3);
    margin-top: 4px;
    font-weight: 400;
  }
  /* プログレス */
  .progress-wrap { margin-bottom: 32px; }
  .progress-bar {
    height: 2px;
    background: var(--border-soft);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-fill {
    height: 100%;
    background: var(--pink);
    border-radius: 2px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }
  .step-label {
    font-size: 11px;
    color: var(--text-3);
    text-align: center;
    letter-spacing: .1em;
  }
  /* 質問 */
  .q-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.6;
    text-align: center;
  }
  .q-sub {
    font-size: 13px;
    color: var(--text-3);
    margin-bottom: 20px;
    text-align: center;
  }
  .multi-hint {
    font-size: 11px;
    color: var(--pink);
    text-align: center;
    margin-bottom: 14px;
    letter-spacing: .05em;
  }
  /* 選択肢 */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color .15s, background .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .opt-btn:hover { border-color: var(--pink-border); background: var(--pink-light); }
  .opt-btn:active { transform: scale(0.99); }
  .opt-btn.selected {
    border: 1.5px solid var(--pink);
    background: var(--pink-light);
  }
  .opt-icon {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .opt-btn.selected .opt-icon { background: #fff; }
  .opt-text { flex: 1; }
  .opt-label { font-size: 14px; font-weight: 500; color: var(--text); }
  .opt-desc { font-size: 12px; color: var(--text-3); margin-top: 3px; }
  .check-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--pink);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    opacity: 0;
    transform: scale(0.6);
    transition: opacity .2s, transform .2s;
  }
  .opt-btn.selected .check-icon { opacity: 1; transform: scale(1); }
  .check-icon svg { width: 11px; height: 11px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  /* ナビ */
  .nav { display: flex; gap: 10px; margin-top: 24px; }
  .btn-back {
    flex: 1; padding: 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    cursor: pointer;
    font-size: 14px;
    color: var(--text-2);
    font-family: 'Noto Sans JP', sans-serif;
    transition: background .15s;
  }
  .btn-back:hover { background: var(--bg); }
  .btn-next {
    flex: 2; padding: 13px;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--pink);
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    transition: opacity .15s, transform .1s;
    letter-spacing: .05em;
  }
  .btn-next:disabled { opacity: .35; cursor: default; }
  .btn-next:not(:disabled):hover { opacity: .9; }
  .btn-next:not(:disabled):active { transform: scale(0.99); }

  /* ===== 結果ページ ===== */
  .result-header {
    text-align: center;
    padding: 8px 0 24px;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 24px;
  }
  .result-emoji { font-size: 44px; margin-bottom: 14px; }
  .skin-badge {
    display: inline-block;
    background: var(--pink-light);
    color: var(--pink-dark);
    border: 1px solid var(--pink-border);
    border-radius: 20px;
    padding: 5px 18px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 14px;
    letter-spacing: .04em;
  }
  .result-reason {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.8;
  }
  .section-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-3);
    letter-spacing: .18em;
    margin: 24px 0 12px;
    text-transform: uppercase;
  }
  /* メニューカード */
  .menu-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
  }
  .menu-card.primary { border-color: var(--pink-border); border-width: 1.5px; }
  .menu-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    letter-spacing: .08em;
  }
  .tag-first { background: var(--pink-light); color: var(--pink-dark); }
  .tag-second { background: var(--blue-light); color: var(--blue); }
  .menu-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
  }
  .menu-desc { font-size: 13px; color: var(--text-2); line-height: 1.8; margin-bottom: 12px; }
  .effects { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .effect-pill {
    font-size: 11px;
    background: var(--bg);
    color: var(--text-2);
    padding: 4px 12px;
    border-radius: 10px;
    border: 1px solid var(--border-soft);
  }
  .ing-box {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 14px;
  }
  .ing-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    letter-spacing: .1em;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .ing-item {
    display: flex;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .ing-item:last-child { border-bottom: none; padding-bottom: 0; }
  .ing-name { font-size: 12px; font-weight: 500; color: var(--text); min-width: 110px; flex-shrink: 0; }
  .ing-desc { font-size: 12px; color: var(--text-2); line-height: 1.5; }
  /* コンボ理由 */
  .combo-box {
    background: var(--pink-light);
    border: 1px solid var(--pink-border);
    border-radius: var(--radius);
    padding: 16px;
    margin: 20px 0;
  }
  .combo-title { font-size: 13px; font-weight: 500; color: var(--pink-dark); margin-bottom: 8px; }
  .combo-desc { font-size: 13px; color: #7a3050; line-height: 1.8; }
  /* ホームケア */
  .homecare-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
  }
  .homecare-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 12px; }
  .homecare-item {
    font-size: 13px;
    color: var(--text-2);
    padding: 8px 0;
    border-bottom: 1px solid var(--border-soft);
    line-height: 1.6;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .homecare-item:last-child { border-bottom: none; padding-bottom: 0; }
  .homecare-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--pink);
    margin-top: 7px;
    flex-shrink: 0;
  }
  /* CTA */
  .cta-box {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
  }
  .cta-msg {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.9;
    margin-bottom: 16px;
  }
  .cta-btn {
    display: block;
    width: 100%;
    padding: 15px;
    background: var(--pink);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    letter-spacing: .06em;
    transition: opacity .15s;
    margin-bottom: 10px;
  }
  .cta-btn:hover { opacity: .9; }
  .restart-btn {
    display: block;
    width: 100%;
    padding: 13px;
    background: transparent;
    color: var(--text-3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: background .15s;
  }
  .restart-btn:hover { background: var(--bg); }
  .cta-store-label { font-size: 12px; color: var(--text-3); text-align: center; margin-bottom: 8px; letter-spacing: .08em; }
  .cta-store-btns { display: flex; gap: 8px; margin-bottom: 12px; }
  .cta-store-btn { flex: 1; padding: 11px 6px; background: var(--pink-light); color: var(--pink-dark); border: 1.5px solid var(--pink-border); border-radius: 30px; font-size: 12px; font-weight: 500; text-align: center; text-decoration: none; font-family: 'Noto Sans JP', sans-serif; display: block; }
  .cta-store-btn:hover { background: var(--pink); color: #fff; }

  /* MYREE レコメンド */
  .myree-diag-banner{background:linear-gradient(135deg,#fdf5f7,#fff8f0);border:1px solid var(--pink-border);border-radius:var(--radius);padding:16px;margin-bottom:20px}
  .myree-diag-title{font-size:14px;font-weight:500;color:var(--pink-dark);margin-bottom:2px}
  .myree-diag-sub{font-size:11px;color:var(--text-3);margin-bottom:12px}
  .myree-diag-products{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
  .myree-diag-product{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:12px;position:relative}
  .myree-diag-badge{position:absolute;top:0;left:0;font-size:9px;font-weight:500;padding:3px 10px;border-radius:0 0 var(--radius-sm) 0;letter-spacing:.06em;color:#fff}
  .badge-main{background:var(--pink)}
  .badge-sub{background:var(--text-3)}
  .myree-diag-img{width:72px;height:72px;object-fit:cover;border-radius:6px;flex-shrink:0;margin-top:8px}
  .myree-diag-info{flex:1;min-width:0;margin-top:8px}
  .myree-diag-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.5}
  .myree-diag-desc{font-size:11px;color:var(--text-3);line-height:1.6}
  .myree-diag-note{font-size:10px;color:var(--text-3);text-align:center;padding-top:8px;border-top:1px solid var(--border-soft)}
  .menu-list-btn {
    display: block; width: 100%; padding: 13px;
    background: transparent; color: var(--pink-dark);
    border: 1.5px solid var(--pink-border);
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; margin-top: 10px;
    transition: background .15s;
  }
  .menu-list-btn:hover { background: var(--pink-light); }
  .menu-list-header {
    text-align: center; padding: 8px 0 24px;
    border-bottom: 1px solid var(--border-soft); margin-bottom: 24px;
  }
  .menu-list-header h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 6px;
  }
  .menu-list-header p { font-size: 13px; color: var(--text-3); line-height: 1.7; }
  .menu-group-label {
    font-size: 10px; font-weight: 500; color: var(--text-3);
    letter-spacing: .18em; text-transform: uppercase;
    margin: 20px 0 10px; display: flex; align-items: center; gap: 8px;
  }
  .menu-group-label::after { content:''; flex:1; height:1px; background: var(--border-soft); }
  .menu-detail-card {
    background: var(--surface); border: 1px solid var(--border-soft);
    border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
    cursor: pointer; transition: border-color .15s;
  }
  .menu-detail-card:hover { border-color: var(--pink-border); }
  .menu-detail-card.open { border-color: var(--pink-border); border-width: 1.5px; }
  .menu-detail-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .menu-detail-name { font-family: 'Noto Serif JP', serif; font-size: 17px; font-weight: 500; color: var(--text); }
  .menu-detail-arrow {
    width: 24px; height: 24px; flex-shrink: 0;
    border-radius: 50%; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: transform .25s, background .15s;
  }
  .menu-detail-card.open .menu-detail-arrow { transform: rotate(180deg); background: var(--pink-light); border-color: var(--pink-border); }
  .menu-detail-arrow svg { width: 12px; height: 12px; stroke: var(--text-3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .menu-detail-card.open .menu-detail-arrow svg { stroke: var(--pink); }
  .menu-detail-body { display: none; margin-top: 14px; }
  .menu-detail-card.open .menu-detail-body { display: block; }
  .menu-detail-desc { font-size: 13px; color: var(--text-2); line-height: 1.8; margin-bottom: 12px; }
  .worry-box {
    background: var(--pink-light); border: 1px solid var(--pink-border);
    border-radius: var(--radius-sm); padding: 12px; margin-bottom: 12px;
  }
  .worry-title { font-size: 11px; font-weight: 500; color: var(--pink-dark); margin-bottom: 8px; letter-spacing: .05em; }
  .worry-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .worry-tag {
    font-size: 12px; background: #fff; color: var(--pink-dark);
    border: 1px solid var(--pink-border); padding: 4px 12px; border-radius: 10px;
  }
  .detail-ing-box { background: var(--bg); border-radius: var(--radius-sm); padding: 12px; }
  .back-to-result-btn {
    display: block; width: 100%; padding: 13px;
    background: var(--pink); color: #fff; border: none;
    border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 24px;
    transition: opacity .15s;
  }
  .back-to-result-btn:hover { opacity: .9; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }
  .fade-up { animation: fadeUp .3s ease both; }
</style>
</head>

  <div class="logo">
    &amp;<span>me</span>
    <small>SKIN DIAGNOSIS</small>
  </div>
  <div id="quiz-area"></div>
</div>

];

const menuDB = {
  // ── メニュー1グループ（ピーリング系）──

function getMYREEBySkin(concern, skinType){
  const c = concern || '';
  const t = skinType || '';
  if(c.includes('毛穴') || c.includes('黒ずみ'))     return { main: MYREE_DB.oil,  sub: MYREE_DB.mist };
  if(c.includes('くすみ') || c.includes('シミ'))      return { main: MYREE_DB.pack, sub: MYREE_DB.mist };
  if(c.includes('ニキビ') || c.includes('吹き出物'))  return { main: MYREE_DB.milk, sub: MYREE_DB.mist };
  if(c.includes('乾燥') || t.includes('乾燥'))        return { main: MYREE_DB.mist, sub: MYREE_DB.balm };
  if(c.includes('ハリ') || c.includes('たるみ'))      return { main: MYREE_DB.pack, sub: MYREE_DB.mist };
  if(t.includes('敏感'))                              return { main: MYREE_DB.balm, sub: MYREE_DB.milk };

}

let current = 0, answers = {}, multiSel = {};

function renderQ(idx){
  const q = questions[idx];
  const pct = Math.round((idx / questions.length) * 100);
  if(q.multi && !multiSel[q.id]) multiSel[q.id] = new Set();

  let optHTML = q.options.map((o,i) => {
    const sel = q.multi ? multiSel[q.id].has(o.label) : answers[q.id]===o.label;
    return `<button class="opt-btn${sel?' selected':''} fade-up"
      style="animation-delay:${i*0.05}s"
      onclick="pick('${q.id}','${o.label}',${q.multi},this)">
      <div class="opt-icon">${o.icon}</div>
      <div class="opt-text">
        <div class="opt-label">${o.label}</div>
        ${o.desc?`<div class="opt-desc">${o.desc}</div>`:''}
      </div>
      <div class="check-icon">
        <svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>
      </div>
    </button>`;
  }).join('');

  const hasAns = q.multi ? (multiSel[q.id].size > 0) : !!answers[q.id];
  document.getElementById('quiz-area').innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="step-label">${idx+1} / ${questions.length}</div>
    </div>
    <div class="q-title fade-up" style="white-space:pre-line">${q.title}</div>
    ${q.sub?`<div class="q-sub">${q.sub}</div>`:''}
    ${q.multi?'<div class="multi-hint">複数選択できます</div>':''}
    <div class="options">${optHTML}</div>
    <div class="nav">
      ${idx>0?'<button class="btn-back" onclick="goBack()">← 戻る</button>':''}
      <button class="btn-next" id="nb" ${hasAns?'':'disabled'} onclick="goNext()">
        ${idx<questions.length-1?'次へ →':'診断結果を見る →'}
      </button>
    </div>
  `;
}

function pick(qid, label, isMulti, el){
  if(isMulti){
    if(!multiSel[qid]) multiSel[qid]=new Set();
    if(multiSel[qid].has(label)){ multiSel[qid].delete(label); el.classList.remove('selected'); }
    else { multiSel[qid].add(label); el.classList.add('selected'); }
    document.getElementById('nb').disabled = multiSel[qid].size===0;
  } else {
    answers[qid]=label;
    document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('nb').disabled=false;
  }
}

function goNext(){
  const q=questions[current];
  if(q.multi) answers[q.id]=[...multiSel[q.id]].join('・');
  current++;
  if(current>=questions.length) showResult();
  else renderQ(current);
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack(){ if(current>0){ current--; renderQ(current); window.scrollTo({top:0,behavior:'smooth'}); } }

function showMenuList(){
  let html = `
    <div class="menu-list-header fade-up">
      <h2>メニュー紹介</h2>
      <p>＆meの5つのメニューの特徴と<br>おすすめの肌悩みをご紹介します</p>
    </div>
  `;
  menuListData.forEach(group => {
    html += `<div class="menu-group-label">${group.groupLabel}</div>`;
    group.items.forEach((item, i) => {
      html += `
        <div class="menu-detail-card" id="mdc-${group.group}-${i}" onclick="toggleCard('mdc-${group.group}-${i}')">
          <div class="menu-detail-head">
            <div class="menu-detail-name">${item.name}</div>
            <div class="menu-detail-arrow">
              <svg viewBox="0 0 12 12"><polyline points="2,4 6,8 10,4"/></svg>
            </div>
          </div>
          <div class="menu-detail-body">
            <div class="menu-detail-desc">${item.desc}</div>
            <div class="worry-box">
              <div class="worry-title">こんな肌悩みにおすすめ ✨</div>
              <div class="worry-tags">${item.worries.map(w=>`<span class="worry-tag">${w}</span>`).join('')}</div>
            </div>
            <div class="detail-ing-box">
              <div class="ing-title">主な成分・アプローチ</div>
              ${item.ingredients.map(i=>`<div class="ing-item"><div class="ing-name">${i.name}</div><div class="ing-desc">${i.desc}</div></div>`).join('')}
            </div>
          </div>
        </div>
      `;
    });
  });
  html += `<button class="back-to-result-btn" onclick="showResult()">← 診断結果に戻る</button>`;

  document.getElementById('quiz-area').innerHTML = html;
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleCard(id){
  const card = document.getElementById(id);
  card.classList.toggle('open');
}
